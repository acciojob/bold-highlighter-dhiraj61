<script>
//Your code goes here 
	function allowDrop(event){
		event.preventDefault();
	}

	function drag(event){
		event.dataTransfer.setData('text',event.target.classList[1]);
	}

	function drop(event){
		event.preventDefault();
		let fetchData = event.dataTransfer.getData('text');
		event.target.appendChild(document.querySelector(`.${fetchData}`));
	}
</script>
